# Tag-driven cross-platform release.
#
# Push a version tag (e.g. `v0.1.0`) to build installers for Windows, macOS
# (Apple Silicon + Intel) and Linux, then publish them to a GitHub Release.
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# Optional secrets (fall back to the values baked into vite.config.ts if unset):
#   DESKTOP_OAUTH_CLIENT_ID, DESKTOP_OAUTH_CLIENT_SECRET
name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to (re)build, e.g. v0.1.0'
        required: true

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: macos-latest, target: aarch64-apple-darwin, args: '--target aarch64-apple-darwin' }
          - { platform: macos-latest, target: x86_64-apple-darwin, args: '--target x86_64-apple-darwin' }
          - { platform: ubuntu-22.04, target: '', args: '' }
          - { platform: windows-latest, target: '', args: '' }
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          submodules: recursive # gemoji assets

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # Version comes from the "packageManager" field in package.json
      # (pnpm@9.x). Don't also set `version:` here — action-setup@v4 errors
      # with "Multiple versions of pnpm specified" if both are present.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri -> target

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DESKTOP_OAUTH_CLIENT_ID: ${{ secrets.DESKTOP_OAUTH_CLIENT_ID }}
          DESKTOP_OAUTH_CLIENT_SECRET: ${{ secrets.DESKTOP_OAUTH_CLIENT_SECRET }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'GitHub Desktop Next ${{ github.event.inputs.tag || github.ref_name }}'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
